<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Payment Successful</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F6F9FC;
      color: #1A1F36;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .icon-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 2px solid #E0E6EB;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
      animation: scaleIn 0.4s ease-out;
    }

    .checkmark {
      width: 32px;
      height: 32px;
      stroke: #30B566;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .checkmark-path {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: draw 0.5s ease-out 0.3s forwards;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1A1F36;
    }

    .message {
      font-size: 15px;
      color: #6B7C93;
      line-height: 1.6;
    }

    @keyframes scaleIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-circle">
      <svg class="checkmark" viewBox="0 0 44 44">
        <path class="checkmark-path" d="M12 22 L19 29 L32 16" />
      </svg>
    </div>

    <h1>Payment successful</h1>
    <p class="message">You're all set. Close this page and return to the app.</p>
  </div>
</body>
</html>
