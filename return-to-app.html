<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ringback</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F6F9FC;
      color: #1A1F36;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container { text-align: center; max-width: 400px; width: 100%; }
    .icon-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #FFFFFF;
      border: 2px solid #E0E6EB;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: #1A1F36; }
    .message { font-size: 15px; color: #6B7C93; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-circle">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1A1F36" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </div>
    <h1>You're all done here</h1>
    <p class="message">Close this page and return to the app.</p>
  </div>
</body>
</html>
